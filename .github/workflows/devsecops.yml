name: CI-CD DevSecOps Shift-Left

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security_analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 

  build_and_scan:
    needs: security_analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t devsecops-api:${{ github.sha }} .

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-api:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL' # On ignore HIGH pour le moment
          exit-code: '0'
      - name: Push Image (Simulation)
        run: echo "L'image est propre et sécurisée. Prête pour le déploiement !"